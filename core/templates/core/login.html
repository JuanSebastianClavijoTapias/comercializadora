<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrutaSystem - Iniciar Sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<!-- Google Fonts: Poppins & Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange-primary: #FF6B35;
    --orange-secondary: #E5501A;
    --orange-accent: #FFF0E6;
    --bg-base: #F8F9FB;
    --surface-color: #FFFFFF;
    --text-main: #2D3142;
    --text-sec: #8C92A6;
  }
  body { 
    background: var(--bg-base); 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    font-family: 'Inter', sans-serif;
  }
  .login-card { 
    border-radius: 20px; 
    overflow: hidden; 
    box-shadow: 0 12px 48px rgba(45, 49, 66, 0.08); 
    max-width: 420px; 
    width: 100%; 
    border: 1px solid rgba(0,0,0,0.02);
  }
  .login-header { 
    background: var(--surface-color); 
    padding: 3rem 2rem 1.5rem; 
    text-align: center; 
  }
  h3 { font-family: 'Poppins', sans-serif; color: var(--text-main); }
  
  .form-control {
    border-radius: 8px;
    border: 1px solid #e2e4e8;
    padding: 0.75rem 1rem;
    font-size: 0.95rem;
    transition: all 0.25s ease;
  }
  .input-group-text {
    background-color: transparent;
    border-color: #e2e4e8;
    color: var(--text-sec);
  }
  .form-control:focus {
    border-color: var(--orange-primary);
    box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
  }
  .form-control:focus + .input-group-text,
  .input-group:focus-within .input-group-text {
    border-color: var(--orange-primary);
    color: var(--orange-primary);
  }
  
  .btn-primary {
    background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-secondary) 100%);
    border: none;
    color: white;
    box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
    border-radius: 8px;
    transition: all 0.25s ease;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 107, 53, 0.3);
    background: linear-gradient(135deg, #f05e2b 0%, #d14411 100%);
  }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 d-flex justify-content-center">
      <div class="login-card bg-white">
        <div class="login-header">
          <div class="d-inline-flex justify-content-center align-items-center mb-3" style="width: 72px; height: 72px; background: var(--orange-accent); border-radius: 50%;">
            <i class="bi bi-basket2-fill" style="font-size:2.5rem; color: var(--orange-primary);"></i>
          </div>
          <h3 class="mb-1 fw-bold">FrutaSystem</h3>
          <p style="color: var(--text-sec); font-size: 0.9rem;">Plataforma de gestión comercial</p>
        </div>
        <div class="p-4 pt-1">
          {% if form.errors %}
          <div class="alert alert-danger px-3 py-2 small d-flex align-items-center gap-2" style="border-radius: 8px;">
            <i class="bi bi-exclamation-triangle-fill"></i> Usuario o contraseña incorrectos.
          </div>
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label form-control-sm text-uppercase fw-semibold mb-1" style="color: var(--text-sec); letter-spacing: 0.5px;">Usuario</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label form-control-sm text-uppercase fw-semibold mb-1" style="color: var(--text-sec); letter-spacing: 0.5px;">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold mt-2">
              <i class="bi bi-box-arrow-in-right me-2 fs-5 align-middle"></i> Ingresar al sistema
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
