<form method="post" action="/gastos/{{ gasto.pk }}/editar/?modal=1" id="gastoEditForm">
  {% csrf_token %}
  {% for field in form %}
  <div class="mb-3">
    <label class="form-label fw-semibold small text-uppercase" style="color: var(--text-secondary); letter-spacing: 0.5px;">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<div class="text-danger small mt-1 p-2 bg-danger bg-opacity-10 rounded">{{ field.errors }}</div>{% endif %}
  </div>
  {% endfor %}
  <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
    <button type="submit" class="btn btn-sm text-white" style="background: var(--orange-primary); border-radius: 8px; border: none; padding: 6px 18px;">
      <i class="bi bi-check2 me-1"></i> Guardar Cambios
    </button>
  </div>
</form>
