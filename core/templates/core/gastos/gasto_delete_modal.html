<div class="text-center py-3">
  <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
  <h5 class="mt-3">¿Estás seguro?</h5>
  <p class="text-muted">Vas a eliminar: <strong>{{ gasto.descripcion }}</strong><br>Monto: <strong>${{ gasto.monto|cop }}</strong><br>Esta acción no se puede deshacer.</p>
  <form method="post" action="/gastos/{{ pk }}/eliminar/?modal=1" id="gastoDeleteForm" class="d-flex gap-2 justify-content-center mt-3">
    {% csrf_token %}
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
    <button type="submit" class="btn btn-danger btn-sm" style="border-radius: 8px;">
      <i class="bi bi-trash3 me-1"></i> Sí, eliminar
    </button>
  </form>
</div>
